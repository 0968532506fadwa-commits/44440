<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل حساب جديد</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body {
            background: linear-gradient(135deg, #1a1a2e, #0f3460);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
       .form-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }
        h2 { color: #1a1a2e; text-align: center; margin-bottom: 30px; font-size: 2em; }
       .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #16213e; font-weight: bold; }
        input[type="text"], input[type="email"], input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: 0.3s;
        }
        input:focus { outline: none; border-color: #e94560; }
        input.invalid { border-color: #ff4444; }
       .error { color: #ff4444; font-size: 0.9em; margin-top: 5px; display: none; }
       .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 25px 0;
        }
       .checkbox-group input { width: auto; cursor: pointer; }
       .checkbox-group label { margin: 0; cursor: pointer; }
       .checkbox-group a { color: #e94560; text-decoration: none; }
        button {
            width: 100%;
            padding: 15px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        button:not(:disabled):hover { background: #0f3460; transform: translateY(-2px); }
       .success { 
            background: #4caf50; color: white; padding: 15px; 
            border-radius: 8px; text-align: center; margin-top: 20px; display: none; 
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>إنشاء حساب جديد</h2>
        <form id="registerForm" novalidate>
            <div class="form-group">
                <label>الاسم الكامل</label>
                <input type="text" id="name" required minlength="3">
                <div class="error" id="nameError">الاسم لازم يكون 3 أحرف على الأقل</div>
            </div>

            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <input type="email" id="email" required>
                <div class="error" id="emailError">اكتب بريد إلكتروني صحيح</div>
            </div>

            <div class="form-group">
                <label>كلمة المرور</label>
                <input type="password" id="password" required minlength="8">
                <div class="error" id="passwordError">كلمة المرور 8 أحرف على الأقل</div>
            </div>

            <div class="form-group">
                <label>تأكيد كلمة المرور</label>
                <input type="password" id="confirmPassword" required>
                <div class="error" id="confirmError">كلمة المرور غير متطابقة</div>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="terms">
                <label for="terms">أوافق على <a href="#" onclick="alert('شروط الاستخدام: 1- لا تشارك حسابك 2- احترم الآخرين')">اتفاقية الاستخدام</a></label>
            </div>

            <button type="submit" id="submitBtn" disabled>تسجيل</button>
            <div class="success" id="successMsg">تم التسجيل بنجاح! 🎉</div>
        </form>
    </div>

    <script>
        const form = document.getElementById('registerForm');
        const inputs = form.querySelectorAll('input[required]');
        const terms = document.getElementById('terms');
        const submitBtn = document.getElementById('submitBtn');

        // التحقق من الحقول
        function validateField(input) {
            const errorEl = document.getElementById(input.id + 'Error');
            let valid = true;

            if (input.id === 'name' && input.value.length < 3) valid = false;
            if (input.id === 'email' &&!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(input.value)) valid = false;
            if (input.id === 'password' && input.value.length < 8) valid = false;
            if (input.id === 'confirmPassword' && input.value!== document.getElementById('password').value) valid = false;
            if (input.value.trim() === '') valid = false;

            input.classList.toggle('invalid',!valid);
            if (errorEl) errorEl.style.display = valid? 'none' : 'block';
            return valid;
        }

        // تفعيل زر التسجيل
        function checkForm() {
            let allValid = true;
            inputs.forEach(input => {
                if (!validateField(input)) allValid = false;
            });
            submitBtn.disabled =!(allValid && terms.checked);
        }

        inputs.forEach(input => {
            input.addEventListener('input', checkForm);
            input.addEventListener('blur', () => validateField(input));
        });
        terms.addEventListener('change', checkForm);

        // عند الإرسال
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            if (!submitBtn.disabled) {
                document.getElementById('successMsg').style.display = 'block';
                form.reset();
                submitBtn.disabled = true;
                setTimeout(() => {
                    document.getElementById('successMsg').style.display = 'none';
                }, 3000);
            }
        });
    </script>
</body>
</html>
